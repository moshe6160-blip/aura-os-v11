<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>AURA OS - Sofia</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div>
        <div class="brand">AURA OS</div>
        <div class="mode">Real Connector Mode</div>
      </div>
      <div class="avatar">M</div>
    </header>

    <section class="hero card">
      <div class="orb">SOFIA</div>
      <h1>Sofia needs real data.</h1>
      <p id="connectionText">Connect Google to start reading Gmail and Calendar signals.</p>

      <div class="actions">
        <button class="primary" id="connectBtn">Connect Google</button>
        <button id="briefingBtn">Load Real Briefing</button>
        <button id="testBtn">Test Functions</button>
      </div>
    </section>

    <section class="card">
      <h2>Real Briefing</h2>
      <div id="briefingBox" class="briefing">
        <div class="empty">No real data loaded yet.</div>
      </div>
    </section>

    <section class="card">
      <h2>Connector Status</h2>
      <div id="statusBox" class="status-list">
        <div class="row"><b>Functions</b><span>Tap Test Functions.</span></div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
