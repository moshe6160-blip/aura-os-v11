<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>AURA OS V11.1</title>
<style>
:root{--bg:#080808;--gold:#c8a56a;--text:#f5f5f5;--muted:#aaa;--line:rgba(255,255,255,.12)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 10%,rgba(200,165,106,.16),transparent 34%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding:34px 18px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{color:var(--gold);font-weight:900;letter-spacing:4px}.sub{color:var(--muted);margin-top:8px}.profile{width:44px;height:44px;border-radius:50%;border:1px solid rgba(200,165,106,.4);background:rgba(255,255,255,.08);color:var(--gold);font-weight:900}
.hero,.panel{border:1px solid var(--line);border-radius:32px;background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.04));padding:24px;margin-bottom:16px;box-shadow:0 18px 50px rgba(0,0,0,.28)}
.hero{text-align:center;min-height:54vh;display:flex;flex-direction:column;align-items:center;justify-content:center}.orb{width:160px;height:160px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,#efd08a,#9b7438);color:#111;font-weight:1000;letter-spacing:3px;box-shadow:0 0 80px rgba(200,165,106,.25);margin-bottom:24px}
h1{color:var(--gold);font-size:34px;line-height:1.05;margin:0 0 12px}h2{color:var(--gold);margin-top:0}p{color:var(--muted);line-height:1.45}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{border:0;border-radius:999px;background:var(--gold);color:#111;font-weight:900;padding:14px 18px;margin-top:8px}.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line)}
.item{border-top:1px solid var(--line);padding:12px 0}.item b{display:block}.item small{color:var(--muted)}.ok{color:#5cff9d}.bad{color:#ff5b5b}
</style></head><body>
<div class="app">
<header class="top"><div><div class="brand">AURA OS</div><div class="sub">Real Connector Mode</div></div><button class="profile">M</button></header>
<section class="hero"><div class="orb">SOFIA</div><h1>Sofia needs real data.</h1><p id="status">Connect Google to start reading Gmail and Calendar signals.</p><div class="actions"><button id="connectBtn">Connect Google</button><button class="ghost" id="refreshBtn">Load Real Briefing</button><button class="ghost" id="testBtn">Test Functions</button></div></section>
<section class="panel"><h2>Real Briefing</h2><div id="briefing"><p>No real data loaded yet.</p></div></section>
<section class="panel"><h2>Connector Status</h2><div id="debug"><p>Tap Test Functions.</p></div></section>
</div>
<script>
const statusEl=document.getElementById('status'), briefingEl=document.getElementById('briefing'), debugEl=document.getElementById('debug');
document.getElementById('connectBtn').onclick=()=>{location.href='/.netlify/functions/google-auth'};
document.getElementById('testBtn').onclick=async()=>{debugEl.innerHTML='<p>Testing...</p>';try{const r=await fetch('/.netlify/functions/status');const d=await r.json();debugEl.innerHTML=`<div class="item"><b>Functions</b><small class="${r.ok?'ok':'bad'}">${r.ok?'Working':'Problem'}</small></div><div class="item"><b>GOOGLE_CLIENT_ID</b><small>${d.hasClientId?'Found':'Missing'}</small></div><div class="item"><b>GOOGLE_CLIENT_SECRET</b><small>${d.hasClientSecret?'Found':'Missing'}</small></div><div class="item"><b>GOOGLE_REDIRECT_URI</b><small>${d.redirectUri||'Missing'}</small></div>`}catch(e){debugEl.innerHTML='<p class="bad">Functions not working.</p>'}};
document.getElementById('refreshBtn').onclick=async()=>{briefingEl.innerHTML='<p>Loading real Google signals...</p>';try{const r=await fetch('/.netlify/functions/google-briefing');const d=await r.json();if(!r.ok){briefingEl.innerHTML='<p>'+esc(d.error||'Not connected yet')+'</p>';return}statusEl.textContent='Google connected. Sofia is reading real signals.';let emails=d.emails||[],events=d.events||[];briefingEl.innerHTML=`<div class="item"><b>Gmail</b><small>${emails.length} recent email signals</small></div>${emails.map(e=>`<div class="item"><b>${esc(e.subject||'No subject')}</b><small>${esc(e.from||'')}</small></div>`).join('')}<div class="item"><b>Calendar</b><small>${events.length} upcoming signals</small></div>${events.map(ev=>`<div class="item"><b>${esc(ev.summary||'Untitled')}</b><small>${esc(ev.start||'')}</small></div>`).join('')}`}catch(e){briefingEl.innerHTML='<p class="bad">Could not load data. Test Functions first.</p>'}};
function esc(s){return String(s).replace(/[&<>"']/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[x]))}
</script></body></html>
